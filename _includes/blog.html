<h2>Novidades do Estúdio</h2>
<p class="subtitle">Fique por dentro das nossas produções e dicas de áudio</p>

<div class="posts-grid">
    {% for post in site.posts limit: 10 %}
    <article class="post-card">
        <span class="post-card-date">{{ post.date | date: "%d/%m/%Y" }}</span>

        <h3 class="post-card-title">
            <a href="{{ post.url | relative_url }}" class="post-card-title-link">
                {{ post.title }}
            </a>
        </h3>

        <p class="post-card-excerpt">
            {{ post.content | strip_html | truncatewords: 20 }}
        </p>

        {% if post.image %}
        <img
            src="{{ post.image }}"
            alt="{{ post.image_alt | default: post.title }}"
            class="post-card-image"
        >
        {% endif %}
    </article>
    {% endfor %}
</div>
