<h2>Novidades do Estúdio</h2>
<p class="subtitle">Fique por dentro das nossas produções e dicas de áudio</p>

<div style="display: flex; flex-direction: column; gap: 1.5rem; max-width: 600px; margin: 0 auto;">

    {% for post in site.posts limit: 10 %}
    <a href="{{ post.url | relative_url }}" style="display: block; text-decoration: none; color: inherit;">

        {% if post.image %}
        <img src="{{ post.image }}" alt="{{ post.title }}"
            style="width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 1rem;">
        {% endif %}

        <h3>{{ post.title }}</h3>
        <p>{{ post.date | date: "%d/%m/%Y" }}</p>
    </a>
    {% endfor %}
</div>
