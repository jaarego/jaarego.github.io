<div class="contact-container">
    <h2>Vamos Trabalhar Juntos?</h2>
    <p>Explica-nos o teu projeto e respondemos em menos de 24 horas.</p>

    <!-- Formulário ligado ao Web3Forms -->
    <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">

        <!-- COLA A TUA CHAVE DE ACESSO AQUI -->
        <input type="hidden" name="access_key" value="de7e4241-031c-41dc-b408-7dcd6bf8232e">

        <!-- Evita spam e robôs de forma invisível -->
        <input type="checkbox" name="botcheck" class="hidden-honeypot" style="display: none;">

        <div class="form-group">
            <input type="text" name="Nome" placeholder="Teu Nome" required>
        </div>

        <div class="form-group">
            <input type="email" name="Email" placeholder="Teu Email" required>
        </div>

        <div class="form-group">
            <textarea name="Mensagem" placeholder="Fala-nos sobre a tua ideia musical..." rows="5" required></textarea>
        </div>

        <!-- Página para onde o cliente é redirecionado após enviar (Opcional) -->
        <!-- <input type="hidden" name="redirect" value="github.io"> -->

        <button type="submit" class="btn-submit">Enviar Mensagem</button>
    </form>
</div>
