<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | SOUNDWAVE</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

    <main style="padding: 8rem 8%; max-width: 800px; margin: 0 auto;">
        <a href="{{ '/' | relative_url }}" style="color: var(--accent); text-decoration: none;">&larr; Voltar ao Início</a>
        <h1 style="margin-top: 2rem; font-size: 3rem;">{{ page.title }}</h1>
        <p style="color: var(--text-muted); margin-bottom: 3rem;">Publicado em: {{ page.date | date: "%d/%m/%Y" }}</p>
        
        {% if page.image %}
          <img 
            src="{{ page.image }}" 
            alt="{{ page.title }}" 
            style="width: 100%; max-height: 500px; object-fit: cover; border-radius: 16px; margin-bottom: 2rem;"
          >
        {% endif %}

        <div class="post-content">
            {{ content }}
        </div>
    </main>

</body>
</html>
